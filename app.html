<!DOCTYPE html>
<html>
<head>
  <title>Sports Wordle</title>
  <link rel="stylesheet" href="app-styles.css">
</head>

<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="resume.html">Resume</a>
  <a href="scratch.html">Scratch</a>
  <a href="app.html" class="active">App</a>
</div>

<h1>Sports Wordle</h1>

<div id="board"></div>
<div id="keyboard"></div>

<input type="text" id="guess" maxlength="5">
<button onclick="submitGuess()">Enter</button>

<p id="message"></p>
<button id="playAgainBtn" onclick="playAgain()">Play Again</button>

<script>
const words = ["BOXER", "SKATE", "CLIMB", "THROW", "CATCH", "SCORE", "COURT", "FIELD", "TRACK", "POOL", "RINK", "ARENA", "PITCH", "SERVE", "SPIKE", "SHOOT", "BLOCK", "POINT", "MATCH", "ROUND"];
let word = "";
let currentRow = 0;
let gameOver = false;

const board = document.getElementById("board");

function getRandomWord() {
  return words[Math.floor(Math.random() * words.length)];
}

function initGame() {
  word = getRandomWord();
  currentRow = 0;
  gameOver = false;
  document.getElementById("guess").value = "";
  document.getElementById("message").innerText = "";
  document.getElementById("playAgainBtn").style.display = "none";
  
  // clear board
  const tiles = document.querySelectorAll(".tile");
  tiles.forEach(tile => {
    tile.innerText = "";
    tile.classList.remove("correct", "present", "absent");
  });
  
  document.getElementById("guess").focus();

  const keys = document.querySelectorAll(".key");
  keys.forEach(key => {
    key.classList.remove("correct", "present", "absent");
  });
}

function updateKey(letter, status) {
  const key = document.getElementById(`key-${letter}`);
  if (!key) return;

  const current = key.classList.contains("correct") ? "correct" :
                  key.classList.contains("present") ? "present" :
                  key.classList.contains("absent") ? "absent" : null;

  const priority = { absent: 1, present: 2, correct: 3 };
  if (current && priority[current] >= priority[status]) return;

  key.classList.remove("correct", "present", "absent");
  key.classList.add(status);
}

// create board
for (let i = 0; i < 30; i++) {
  let tile = document.createElement("div");
  tile.classList.add("tile");
  board.appendChild(tile);
}

const keyboardRows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
const keyboard = document.getElementById("keyboard");

function createKeyboard() {
  keyboardRows.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("keyboard-row");

    row.split("").forEach(letter => {
      const key = document.createElement("div");
      key.classList.add("key");
      key.id = `key-${letter}`;
      key.innerText = letter;
      rowDiv.appendChild(key);
    });

    keyboard.appendChild(rowDiv);
  });
}

createKeyboard();

// initialize first game
initGame();

function submitGuess() {
  if (gameOver) return;
  
  let guessInput = document.getElementById("guess");
  let guess = guessInput.value.toUpperCase();

  if (guess.length !== 5) {
    document.getElementById("message").innerText = "Enter 5 letters!";
    return;
  }

  for (let i = 0; i < 5; i++) {
    let tile = board.children[currentRow * 5 + i];
    tile.innerText = guess[i];

    let status = "absent";
    if (guess[i] === word[i]) {
      tile.classList.add("correct");
      status = "correct";
    } else if (word.includes(guess[i])) {
      tile.classList.add("present");
      status = "present";
    } else {
      tile.classList.add("absent");
    }

    updateKey(guess[i], status);
  }

  if (guess === word) {
    document.getElementById("message").innerText = "You got it!";
    gameOver = true;
    document.getElementById("playAgainBtn").style.display = "block";
    return;
  }

  currentRow++;
  guessInput.value = "";
  guessInput.focus();

  if (currentRow === 6) {
    document.getElementById("message").innerText = "Game Over! Word was " + word;
    gameOver = true;
    document.getElementById("playAgainBtn").style.display = "block";
  }
}

function playAgain() {
  initGame();
}
</script>

</body>
</html>
